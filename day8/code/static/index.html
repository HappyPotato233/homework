<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智云科技 - 企业级AI解决方案提供商</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='/static/index.html'">智云科技</div>
        <ul class="nav-links">
            <li><a href="/static/index.html">首页</a></li>
            <li><a href="#about">公司简介</a></li>
            <li><a href="/static/news-list.html">新闻动态</a></li>
            <li><a href="/static/admin.html">管理后台</a></li>
        </ul>
    </nav>

    <div class="container">
        <section id="about" class="hero-section">
            <h1>关于智云科技</h1>
            <div id="introduction-content" class="loading">加载中...</div>
        </section>

        <section>
            <h2 class="section-title">最新动态</h2>
            <div id="latest-news" class="news-grid">
                <div class="loading">加载中...</div>
            </div>
            <div style="text-align: center; margin-top: 30px;">
                <a href="/static/news-list.html" class="btn btn-sm" style="display: inline-block; width: auto; padding: 10px 30px;">查看更多新闻 &rarr;</a>
            </div>
        </section>
    </div>

    <script>
        async function loadIntroduction() {
            try {
                const res = await fetch('/api/introduction');
                const data = await res.json();
                const contentEl = document.getElementById('introduction-content');
                if (data.code === 200 && data.data) {
                    contentEl.textContent = data.data;
                    contentEl.style.whiteSpace = 'pre-wrap';
                } else {
                    contentEl.textContent = '暂无公司简介';
                }
            } catch (err) {
                document.getElementById('introduction-content').textContent = '加载失败，请稍后重试';
            }
        }

        function renderNewsCards(newsList) {
            return newsList.map(news => `
                <div class="news-card" onclick="window.location.href='/static/news-detail.html?id=${news.id}'">
                    <span class="category">${news.category}</span>
                    <h3>${news.title}</h3>
                    <p class="summary">${news.content}</p>
                    <span class="date">${news.publish_time}</span>
                </div>
            `).join('');
        }

        async function loadNews() {
            try {
                const res = await fetch('/api/news');
                const data = await res.json();
                const latestEl = document.getElementById('latest-news');

                if (data.code === 200 && data.data && data.data.length > 0) {
                    const latestNews = data.data.slice(0, 3);
                    latestEl.innerHTML = renderNewsCards(latestNews);
                } else {
                    latestEl.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #999; padding: 40px;">暂无新闻</div>';
                }
            } catch (err) {
                document.getElementById('latest-news').innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #ff4757; padding: 40px;">加载失败，请稍后重试</div>';
            }
        }

        loadIntroduction();
        loadNews();
    </script>
</body>
</html>
